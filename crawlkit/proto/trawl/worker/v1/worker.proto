// Package trawl.worker.v1 is the protocol a trawl crawler speaks to a copy
// of itself.
//
// A long verb (sync, and any classify or import a crawler defines) can run
// for minutes and must survive a parent that is killed or that times out.
// So the parent does not run it in-process. It re-executes its own binary
// as a child, hands it the verb, and supervises it: the child does the
// work, the parent watches. This file is the whole of what they say to each
// other.
//
// Framing. The child writes a stream of length-delimited Frame messages to
// its stdout. Each frame is a base-128 varint byte count followed by that
// many bytes of a marshalled Frame. stdout carries nothing else; the
// child's result is a frame, not printed text. stderr is kept separately,
// only to diagnose a child that dies without sending a result.
//
// Lifecycle of one run. Zero or more Progress and Log frames stream while
// the verb works, then exactly one Result frame ends both the stream and
// the process. A parent that reads a Result stops reading. A stream that
// ends with no Result means the child died, and the parent reports that as
// a failure.
//
// Liveness. The parent watches frame arrival, not frame contents. A
// no-progress watchdog is reset every time any frame lands, and a verb that
// goes silent for the watchdog window is killed. The numbers inside a
// Progress frame are for the human-readable -v log; it is the fact that a
// frame arrived, not what it said, that proves the child is alive.
//
// Versioning. This schema is pre-1.0. We reshape it freely: rename fields,
// renumber them, delete them, and regenerate both sides in the same commit.
// There is deliberately no schema-version field and no compatibility
// window, and buf breaking-change detection is not run. The v1 in the
// package name is buf's required package suffix, not a wire-compatibility
// version. (Engineering rules 1.17 breaking-is-free and 1.18
// always-protobuf; decisions log entry of 2026-07-06.)
syntax = "proto3";

package trawl.worker.v1;

// go_package points at crawlkit's real module path so the generated code
// compiles today. crawlkit is being renamed to trawlkit in TRAWL-149; when
// that lands, this one line becomes
// github.com/openclaw/trawlkit/proto/trawl/worker/v1 and nothing else in
// this file moves, because the proto package is already product-named.
option go_package = "github.com/openclaw/crawlkit/proto/trawl/worker/v1;workerv1";

// Frame is one message on the stream. Exactly one field is set. The parent
// switches on which one to learn whether the child is still working
// (Progress, Log) or done (Result).
message Frame {
  oneof kind {
    Progress progress = 1;
    Log      log      = 2;
    Result   result   = 3;
  }
}

// Progress is a heartbeat with a human breadcrumb, emitted as a long verb
// advances. Its arrival resets the parent's no-progress watchdog. Its
// contents are forwarded to the parent's -v run log and nowhere else:
// crawlkit never computes a percentage from them, so done and total are
// advisory counts, not a ratio the parent renders.
message Progress {
  // phase names the current stage in one lowercase word, such as "download"
  // or "index". The parent turns it into the log event name, for example
  // download_progress, so that -v output groups by stage.
  string phase = 1;

  // done is how many work units this phase has finished so far. A unit is
  // whatever the crawler counts (messages, files, pages) and is opaque to
  // crawlkit.
  int64 done = 2;

  // total is the expected unit count, or 0 when the crawler does not know
  // it yet. 0 means unknown, not none: the parent omits total from the log
  // line rather than printing "total=0".
  int64 total = 3;

  // message is an optional one-line human note for the -v log, such as
  // "downloading the 2024 archive".
  string message = 4;
}

// Log forwards one already-formatted line of the child's run log to the
// parent, which prints it on the parent's -v stream. The child formats the
// line (time, level, text) before sending it, and the parent relays it
// unchanged. The level is therefore already inside the text and is not a
// separate field: the parent never reads a level off the wire, so carrying
// one would be dead weight.
message Log {
  string text = 1;
}

// Result is the terminal frame. The child renders its own output, in text
// or --json exactly as the flags it was given demand, so the parent relays
// finished bytes and never re-renders.
message Result {
  // output is the verb's rendered stdout, ready for the parent to print.
  string output = 1;

  // error is set only when the verb failed. It is the structured body the
  // parent renders as a --json error envelope or a text "Error:" line. On
  // success it is unset.
  Error error = 2;
}

// There is deliberately no exit code in Result. The child's exit status
// is a process fact, and the operating system already delivers it to the
// parent when the child exits; the parent adopts that status as its own.
// One fact, one source: a copy on the wire could only agree with the real
// status or contradict it.

// Error is a failed verb's structured body. code, message, and remedy are
// the human-facing triple every failure carries. lock_path is the only
// structured detail a long verb attaches on this wire.
message Error {
  // code is a stable machine string, such as "archive_busy" or
  // "command_failed". The parent echoes it into --json output and picks a
  // text remedy from it; it never branches on it. Crawlers may define their
  // own codes for their own verbs, so the set is open.
  string code = 1;

  // message is a one-line human summary of what failed.
  string message = 2;

  // remedy is a one-line human next step, such as "wait for the other run
  // to finish, then run the command again".
  string remedy = 3;

  // lock_path is the filesystem path of the run lock another process is
  // holding. It is set only when code is "archive_busy", so that a parent
  // fanning out over several crawlers can name which archive is busy. Empty
  // for every other failure.
  string lock_path = 4;
}
