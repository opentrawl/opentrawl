version: 2

project_name: clawdex

changelog:
  disable: true

builds:
  - id: clawdex
    main: ./cmd/clawdex
    binary: clawdex
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/openclaw/clawdex/internal/cli.Version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

archives:
  - ids:
      - clawdex
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
