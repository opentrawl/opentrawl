name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          case "$release_tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Release tag must look like vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac
          if ! git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" >/dev/null; then
            echo "::error::Release tag does not exist: ${release_tag}"
            exit 1
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout --detach "refs/tags/$RELEASE_TAG"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          case "$release_tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Release tag must look like vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow access to openclaw/homebrew-tap"
            exit 1
          fi

          request_id="wacrawl-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update wacrawl for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo openclaw/homebrew-tap \
            --ref main \
            -f formula=wacrawl \
            -f tag="$RELEASE_TAG" \
            -f repository=openclaw/wacrawl \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            runs_json=$(mktemp)
            if gh run list \
              --repo openclaw/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle > "$runs_json"; then
              run_id=$(jq -r --arg title "$expected_title" '.[] | select(.displayTitle == $title) | .databaseId' "$runs_json" | head -n1)
            else
              run_id=""
            fi
            rm -f "$runs_json"
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          gh run watch "$run_id" \
            --repo openclaw/homebrew-tap \
            --exit-status \
            --interval 10
