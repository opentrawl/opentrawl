version: 2

project_name: wacrawl

changelog:
  disable: true

builds:
  - id: wacrawl
    main: ./cmd/wacrawl
    binary: wacrawl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/steipete/wacrawl/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

archives:
  - ids:
      - wacrawl
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
