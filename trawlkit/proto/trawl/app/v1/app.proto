syntax = "proto3";

package trawl.app.v1;

option go_package = "github.com/opentrawl/opentrawl/trawlkit/proto/trawl/app/v1;appv1";

import "trawl/federation/v1/federation.proto";

message SyncSourceResult {
  string app_id = 1;
  string surface = 2;
  trawl.federation.v1.OperationOutcome outcome = 3;
  trawl.federation.v1.SourceFailure failure = 4;
}

message SyncResponse {
  trawl.federation.v1.OperationOutcome outcome = 1;
  repeated SyncSourceResult sources = 2;
  repeated trawl.federation.v1.SourceFailure failures = 3;
}
