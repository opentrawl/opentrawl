name: release OpenTrawl Alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in x.y.z form; requires app/Release/notes/x.y.z.md
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: opentrawl-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Validate version and release note
        id: release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          notes="app/Release/notes/$VERSION.md"
          [[ -s "$notes" ]]
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "release v$VERSION already exists" >&2
            exit 1
          fi
        shell: bash

      - name: Import Developer ID certificate
        env:
          CERTIFICATE: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          keychain="$RUNNER_TEMP/opentrawl-release.keychain-db"
          certificate="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERTIFICATE" | openssl base64 -d -A > "$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          security list-keychains -d user -s "$keychain"
          identity="$(security find-identity -v -p codesigning "$keychain" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -1)"
          [[ -n "$identity" ]]
          echo "DEVELOPER_ID_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Write signing keys
        env:
          APPLE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          printf '%s' "$APPLE_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle-private-key"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/sparkle-private-key"

      - name: Build, sign and notarise
        env:
          APPLE_API_KEY_FILE: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
          VERSION: ${{ inputs.version }}
          BUILD: ${{ steps.release.outputs.build }}
        run: |
          app/scripts/build-release \
            --output "$RUNNER_TEMP/release" \
            --version "$VERSION" \
            --build "$BUILD" \
            --sparkle-public-key "$SPARKLE_PUBLIC_KEY" \
            --identity "$DEVELOPER_ID_IDENTITY" \
            --notarize

      - name: Prepare signed update feed
        env:
          TAG: ${{ steps.release.outputs.tag }}
          NOTES: ${{ steps.release.outputs.notes }}
        run: |
          app/scripts/prepare-update \
            --release-dir "$RUNNER_TEMP/release" \
            --notes "$NOTES" \
            --tag "$TAG" \
            --private-key "$RUNNER_TEMP/sparkle-private-key" \
            --output "$RUNNER_TEMP/assets"
          (
            cd "$RUNNER_TEMP/assets"
            shasum -a 256 OpenTrawl.dmg appcast.xml > SHA256SUMS
          )

      - name: Verify installed artifact boundary
        run: app/scripts/verify-release --notarized "$RUNNER_TEMP/assets"

      - name: Publish the single Alpha release track
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          NOTES: ${{ steps.release.outputs.notes }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "OpenTrawl Alpha $VERSION" \
            --notes-file "$NOTES" \
            "$RUNNER_TEMP/assets/OpenTrawl.dmg" \
            "$RUNNER_TEMP/assets/appcast.xml" \
            "$RUNNER_TEMP/assets/SHA256SUMS"
