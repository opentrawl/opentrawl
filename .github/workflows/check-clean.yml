name: check-clean
on:
  push:
  pull_request:
jobs:
  check-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin main:refs/remotes/origin/main
      - run: python3 scripts/check_clean_test.py
      - run: scripts/check-clean --range "$(git merge-base origin/main HEAD)..HEAD"
